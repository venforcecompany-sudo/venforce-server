<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Dashboard</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Estilos customizados -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <!-- ========== NAVBAR ========== -->
  <nav class="vf-navbar">
    <a href="dashboard.html" class="nav-brand">
      <span class="nav-brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      Venforce
    </a>

    <button id="btn-logout" class="vf-btn-logout" title="Sair da conta">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </nav>

  <!-- ========== CONTEÚDO PRINCIPAL ========== -->
  <main class="vf-content">

    <!-- Cabeçalho da página -->
    <div class="vf-page-header">
      <h2>Suas Bases</h2>
      <p>Gerencie todas as bases vinculadas à sua conta.</p>
    </div>

    <!-- Card com tabela -->
    <div class="vf-card">

      <!-- Header do card -->
      <div class="vf-card-header">
        <h5>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          Bases cadastradas
        </h5>
        <span id="bases-count" class="vf-badge" style="display:none;">0</span>
      </div>

      <!-- Área de conteúdo dinâmico -->
      <div id="bases-content">

        <!-- Estado de Loading (visível por padrão) -->
        <div id="state-loading" class="vf-loading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          <p>Carregando suas bases…</p>
        </div>

        <!-- Tabela (oculta até carregar) -->
        <div id="state-table" class="vf-table-wrapper" style="display:none;">
          <table class="vf-table">
            <thead>
              <tr>
                <th style="width:50px;">#</th>
                <th>Nome da Base</th>
                <th style="width:110px;">Região</th>
                <th style="width:100px;">Custo</th>
                <th style="width:100px;">Imposto</th>
                <th style="width:120px;">Status</th>
              </tr>
            </thead>
            <tbody id="bases-tbody">
              <!-- Linhas inseridas via JS -->
            </tbody>
          </table>
        </div>

        <!-- Estado vazio -->
        <div id="state-empty" class="vf-empty-state" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
            <polyline points="13 2 13 9 20 9"/>
          </svg>
          <p>Nenhuma base encontrada.</p>
        </div>

        <!-- Estado de erro -->
        <div id="state-error" class="vf-error-state" style="display:none;">
          <p id="error-message">Erro ao carregar dados.</p>
          <button id="btn-retry" class="vf-btn-retry">Tentar novamente</button>
        </div>

      </div>
    </div>

  </main>

  <!-- JS do Dashboard (separado) -->
  <script src="dashboard.js"></script>

</body>
</html>
