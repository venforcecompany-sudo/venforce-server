<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade — Venforce</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Larguras das colunas da tabela de logs */
    .col-w-date    { width: 148px; }
    .col-w-user    { width: 160px; }
    .col-w-action  { width: 200px; }
    .col-w-status  { width: 88px;  }
    .col-w-ip      { width: 130px; }
    .col-w-details { width: auto; min-width: 300px; }
  </style>
</head>
<body>

<div id="app">
  <!-- sidebar injetada por layout.js -->

  <main class="main">
    <div class="page-header">
      <div class="page-header-top">
        <div>
          <h1 class="page-title">Atividade</h1>
          <p class="page-subtitle">Histórico de requisições recebidas pela API.</p>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="card">

        <!-- Filtros -->
        <div class="filter-strip">
          <div class="filter-group">
            <label class="filter-label" for="f-acao">Ação</label>
            <input
              id="f-acao"
              class="input"
              type="text"
              placeholder="ex.: admin.usuario"
              style="width: 190px;"
            >
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-status">Status</label>
            <select id="f-status" class="select" style="width: 110px;">
              <option value="">Todos</option>
              <option value="sucesso">Sucesso</option>
              <option value="falha">Falha</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-de">De</label>
            <input id="f-de" class="input" type="date" style="width: 136px;">
          </div>

          <div class="filter-group">
            <label class="filter-label" for="f-ate">Até</label>
            <input id="f-ate" class="input" type="date" style="width: 136px;">
          </div>

          <button id="btn-filtrar" class="btn btn-primary" style="align-self: flex-end;">
            Filtrar
          </button>

          <button id="btn-limpar" class="btn btn-ghost" style="align-self: flex-end;">
            Limpar
          </button>
        </div>

        <!-- Cabeçalho do card -->
        <div class="card-header">
          <span class="card-title">Logs</span>
          <span class="card-badge" id="total-badge">—</span>
        </div>

        <!-- Tabela -->
        <div class="table-wrap">
          <table>
            <colgroup>
              <col class="col-w-date">
              <col class="col-w-user">
              <col class="col-w-action">
              <col class="col-w-status">
              <col class="col-w-ip">
              <col class="col-w-details">
            </colgroup>
            <thead>
              <tr>
                <th>Data</th>
                <th>Usuário</th>
                <th>Ação</th>
                <th>Status</th>
                <th>IP</th>
                <th>Detalhes</th>
              </tr>
            </thead>
            <tbody id="logs-tbody">
              <tr class="loading-row">
                <td colspan="6">
                  <span class="spinner"></span>carregando logs…
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginação -->
        <div class="pagination" id="pagination" style="display:none;">
          <span class="pagination-info" id="pagination-info"></span>
          <div class="pagination-controls" id="pagination-controls"></div>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="layout.js"></script>
<script src="atividade.js"></script>
</body>
</html>
