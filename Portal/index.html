<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Login</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Estilos customizados -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon inline (evita 404) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <!-- ========== TELA DE LOGIN ========== -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Marca / Logo -->
      <div class="login-brand">
        <div class="brand-icon">
          <!-- Ícone SVG simples -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <h1>Venforce</h1>
        <p>Acesse o painel administrativo</p>
      </div>

      <!-- Alerta de erro (oculto por padrão) -->
      <div id="login-error" class="vf-alert vf-alert-danger" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="login-error-msg">Erro desconhecido.</span>
      </div>

      <!-- Formulário de Login -->
      <form id="login-form" novalidate>

        <!-- Campo de Email -->
        <div class="vf-form-group">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            class="vf-input"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          >
        </div>

        <!-- Campo de Senha -->
        <div class="vf-form-group">
          <label for="senha">Senha</label>
          <input
            type="password"
            id="senha"
            class="vf-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <!-- Botão de Submit -->
        <button type="submit" id="btn-login" class="vf-btn-primary">
          <span id="btn-login-text">Entrar</span>
          <span id="btn-login-spinner" class="btn-spinner" style="display:none;"></span>
        </button>

      </form>

      <!-- Rodapé do card -->
      <div class="login-footer">
        Venforce &copy; <span id="year"></span> &mdash; Marketplace Management
      </div>

    </div>
  </div>

  <!-- JS do Login (separado) -->
  <script src="login.js"></script>

</body>
</html>
