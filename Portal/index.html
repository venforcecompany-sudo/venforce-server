<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Marca -->
      <div class="login-brand">
        <div class="brand-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <h1>VenforceGo</h1>
        <p id="brand-subtitle">Acesse o painel administrativo</p>
      </div>

      <!-- Tabs -->
      <div class="vf-tabs">
        <button class="vf-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
        <button class="vf-tab" id="tab-alterar-senha" onclick="switchTab('alterar-senha')">Alterar senha</button>
      </div>

      <!-- Alert -->
      <div id="form-error" class="vf-alert vf-alert-danger" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="form-error-msg">Erro desconhecido.</span>
      </div>
      <div id="form-success" class="vf-alert vf-alert-success" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="form-success-msg"></span>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" novalidate>
        <div class="vf-form-group">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" class="vf-input" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="vf-form-group">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" class="vf-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" id="btn-login" class="vf-btn-primary">
          <span id="btn-login-text">Entrar</span>
          <span id="btn-login-spinner" class="btn-spinner" style="display:none;"></span>
        </button>
      </form>

      <!-- ALTERAR SENHA -->
      <div id="alterar-senha-info" style="display:none;padding:1.25rem 0 0.5rem;">
        <p style="color:var(--vf-text-m);font-size:0.9rem;text-align:center;line-height:1.6;">
          Para alterar sua senha, solicite ao administrador da VenForce.
        </p>
      </div>

      <div class="login-footer">
        Venforce &copy; <span id="year"></span> &mdash; Marketplace Management
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
