<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page vf-page-clientes">

  <div class="vf-main-with-sidebar">
    <main class="vf-content">

      <div class="vf-page-header">
        <h2>Clientes</h2>
        <p>Gerencie os clientes e suas chaves de API.</p>
      </div>

      <!-- ── ADICIONAR CLIENTE ── -->
      <div class="vf-card" style="margin-bottom:24px;">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="8.5" cy="7" r="4"/>
              <line x1="20" y1="8" x2="20" y2="14"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            Adicionar Cliente
          </h5>
        </div>
        <div style="padding:1.5rem 1.75rem;">
          <div class="vf-clientes-create-grid" style="display:grid;grid-template-columns:1fr 1fr auto;gap:1rem;align-items:end;">
            <div class="vf-form-group" style="margin:0;">
              <label for="cliente-nome">Nome do cliente</label>
              <input type="text" id="cliente-nome" class="vf-input" placeholder="ex: Cliente XYZ">
            </div>
            <div class="vf-form-group" style="margin:0;">
              <label for="cliente-slug">Slug</label>
              <input type="text" id="cliente-slug" class="vf-input" placeholder="ex: cliente_xyz">
            </div>
            <div style="display:flex;justify-content:flex-end;">
              <button id="btn-criar-cliente" class="vf-btn-primary" style="width:auto;margin:0;min-width:160px;">
                <span id="btn-criar-cliente-text">Criar cliente</span>
                <span id="btn-criar-cliente-spinner" class="btn-spinner" style="display:none;"></span>
              </button>
            </div>
          </div>
          <div id="cliente-status" style="margin-top:12px;font-size:.875rem;display:none;"></div>
        </div>
      </div>

      <!-- ── CLIENTES CADASTRADOS ── -->
      <div class="vf-card">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Clientes cadastrados
          </h5>
          <span id="clientes-count" class="vf-badge" style="display:none;">0</span>
        </div>

        <div style="padding:1rem 1.75rem;border-bottom:1px solid var(--vf-border);">
          <input
            type="text"
            id="busca-cliente"
            class="vf-input"
            placeholder="Buscar cliente por nome ou slug..."
            autocomplete="off"
            style="max-width:400px;"
          >
        </div>

        <div id="clientes-content" style="min-height:200px;">
          <div id="clientes-feedback" class="vf-alert" style="margin:14px 1.75rem 0;"></div>
          <div id="state-loading" class="vf-loading">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando clientes…</p>
          </div>
          <div id="state-table" class="vf-table-wrapper" style="display:none;">
            <table class="vf-table">
              <thead>
                <tr>
                  <th style="width:50px;">#</th>
                  <th>Nome</th>
                  <th style="width:180px;">Slug</th>
                  <th style="width:240px;">API Key</th>
                  <th style="width:120px;text-align:center;">Status</th>
                  <th style="width:160px;text-align:center;">Mercado Livre</th>
                  <th style="width:220px;text-align:center;">Ações</th>
                </tr>
              </thead>
              <tbody id="clientes-tbody"></tbody>
            </table>
          </div>
          <div id="state-empty" class="vf-empty-state" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <p>Nenhum cliente encontrado. Crie um cliente acima.</p>
          </div>
          <div id="state-error" class="vf-error-state" style="display:none;">
            <p id="error-message">Erro ao carregar dados.</p>
            <button id="btn-retry" class="vf-btn-retry">Tentar novamente</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <div id="vf-clientes-confirm-modal" class="vf-modal-overlay" style="display:none;">
    <div class="vf-modal-shell" role="dialog" aria-modal="true" aria-labelledby="vf-clientes-confirm-title">
      <div class="vf-modal-header">
        <div>
          <div id="vf-clientes-confirm-title" class="vf-modal-title">Confirmar</div>
          <div id="vf-clientes-confirm-subtitle" class="vf-modal-subtitle"></div>
        </div>
        <button type="button" id="vf-clientes-confirm-close" class="vf-modal-close" aria-label="Fechar">×</button>
      </div>
      <div class="vf-modal-body">
        <p id="vf-clientes-confirm-desc" style="margin:0;color:var(--vf-text-m);"></p>
        <div id="vf-clientes-confirm-danger" class="vf-danger-message" style="display:none;margin-top:12px;"></div>
      </div>
      <div class="vf-modal-footer">
        <button type="button" id="vf-clientes-confirm-cancel" class="vf-action-btn vf-action-btn-secondary">Cancelar</button>
        <button type="button" id="vf-clientes-confirm-ok" class="vf-action-btn vf-action-btn-danger">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="layout.js"></script>
  <script src="clientes.js"></script>
</body>
</html>
