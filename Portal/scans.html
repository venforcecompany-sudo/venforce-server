<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Scans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <div class="vf-main-with-sidebar">
    <main class="vf-content">

      <div class="vf-page-header">
        <h2>Scans</h2>
        <p>Histórico de análises realizadas pela extensão.</p>
      </div>

      <div class="vf-card">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"></line>
              <line x1="18" y1="20" x2="18" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            Scans realizados
          </h5>
          <span class="vf-badge" id="scans-count" style="display:none;">0</span>
        </div>

        <div id="scans-content" style="min-height:200px;">
          <div id="state-loading" class="vf-loading">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando scans…</p>
          </div>
          <div id="state-table" class="vf-table-wrapper" style="display:none;">
            <table class="vf-table">
              <thead>
                <tr>
                  <th style="width:50px;">#</th>
                  <th style="width:190px;">Data</th>
                  <th>Conta ML</th>
                  <th>Base</th>
                  <th style="width:110px;text-align:right;">Total</th>
                  <th style="width:150px;text-align:center;">MC Médio</th>
                  <th style="width:120px;text-align:right;">Saudáveis</th>
                  <th style="width:120px;text-align:right;">Atenção</th>
                  <th style="width:120px;text-align:right;">Críticos</th>
                </tr>
              </thead>
              <tbody id="scans-tbody"></tbody>
            </table>
          </div>
          <div id="state-empty" class="vf-empty-state" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"></line>
              <line x1="18" y1="20" x2="18" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            <p>Nenhum scan encontrado.</p>
          </div>
          <div id="state-error" class="vf-error-state" style="display:none;">
            <p id="error-message">Erro ao carregar dados.</p>
            <button id="btn-retry" class="vf-btn-retry">Tentar novamente</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="layout.js"></script>
  <script src="scans.js"></script>
</body>
</html>
