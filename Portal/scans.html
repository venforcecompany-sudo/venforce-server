<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venforce — Scans</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235A2A8F'/><text x='16' y='22' font-size='18' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>V</text></svg>">
</head>
<body class="vf-page">

  <div class="vf-main-with-sidebar">
    <main class="vf-content">

      <div class="vf-page-header">
        <h2>Scans</h2>
        <p>Análise de lucratividade por conta.</p>
      </div>

      <!-- ── RESUMO GERAL ── -->
      <div class="vf-summary-grid">
        <div class="vf-summary-card">
          <div class="vf-summary-number" id="summary-contas">—</div>
          <div class="vf-summary-label">Total de contas escaneadas</div>
        </div>
        <div class="vf-summary-card">
          <div class="vf-summary-number" id="summary-total">—</div>
          <div class="vf-summary-label">Total de anúncios analisados</div>
        </div>
        <div class="vf-summary-card">
          <div class="vf-summary-number" id="summary-mc">—</div>
          <div class="vf-summary-label">MC médio geral</div>
        </div>
        <div class="vf-summary-card">
          <div class="vf-summary-number" id="summary-criticas">—</div>
          <div class="vf-summary-label">Contas críticas (MC médio &lt; 10%)</div>
        </div>
      </div>

      <!-- ── CONTAS ANALISADAS ── -->
      <div class="vf-card">
        <div class="vf-card-header">
          <h5>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"></line>
              <line x1="18" y1="20" x2="18" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            Contas analisadas
          </h5>
        </div>

        <div id="contas-content" style="min-height:200px;">
          <div id="state-loading" class="vf-loading">
            <div class="loading-dots"><span></span><span></span><span></span></div>
            <p>Carregando scans…</p>
          </div>
          <div id="state-list" style="display:none;">
            <div id="contas-list"></div>
          </div>
          <div id="state-empty" class="vf-empty-state" style="display:none;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="20" x2="12" y2="10"></line>
              <line x1="18" y1="20" x2="18" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            <p>Nenhum scan encontrado.</p>
          </div>
          <div id="state-error" class="vf-error-state" style="display:none;">
            <p id="error-message">Erro ao carregar dados.</p>
            <button id="btn-retry" class="vf-btn-retry">Tentar novamente</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="layout.js"></script>
  <script src="scans.js"></script>
</body>
</html>
