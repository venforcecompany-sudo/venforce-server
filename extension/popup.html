<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>VenForce Scanner</title>
  <style>
    body {
      width: 340px;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3efff;
      padding: 18px;
      margin: 0;
      box-sizing: border-box;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.10);
    }

    .logo {
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      color: #6b39ff;
      margin-bottom: 14px;
    }

    h3 {
      margin: 0 0 14px 0;
      font-size: 16px;
      color: #333;
      text-align: center;
    }

    input,
    select {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      border-radius: 9px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.2s;
      box-sizing: border-box;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #6b39ff;
      box-shadow: 0 0 0 2px rgba(107, 57, 255, 0.15);
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border-radius: 9px;
      border: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, #7d4dff, #5b2be0);
      color: white;
      transition: 0.2s;
      box-sizing: border-box;
    }

    button:hover {
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .secondary {
      background: #ece8ff;
      color: #5b2be0;
      margin-top: 0;
    }

    .secondary:hover {
      background: #e2dbff;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .user {
      font-size: 12px;
      color: #555;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      justify-content: flex-end;
    }

    .actions button {
      width: auto;
      min-width: 64px;
      padding: 7px 10px;
      font-size: 12px;
    }

    .toggle-row {
      display: flex;
      justify-content: flex-end;
      margin: 6px 0 10px 0;
    }

    .toggle-row button {
      width: auto;
      padding: 7px 10px;
      font-size: 12px;
      margin-top: 0;
    }

    .file {
      margin-top: 12px;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 18px;
      line-height: 1.35;
    }
  </style>
</head>
<body>

  <div id="loginView" class="card">
    <div class="logo">VenForce</div>

    <h3>Login</h3>

    <input id="email" type="email" placeholder="Email" />
    <input id="senha" type="password" placeholder="Senha" />

    <button id="btnLogin">Entrar</button>

    <div id="status" class="status"></div>
  </div>

  <div id="appView" class="card" style="display:none;">
    <div class="top-bar">
      <div class="user">
        <span id="usuarioNome"></span>
      </div>

      <div class="actions">
        <button id="btnLogout" class="secondary">Sair</button>
      </div>
    </div>

    <div class="toggle-row">
      <button id="btnToggleVenforce" class="secondary">Scanner: ON</button>
    </div>

    <input id="filtroBase" type="text" placeholder="Filtrar bases..." />

    <select id="basesSelect">
      <option value="">Selecionar base</option>
    </select>

    <div style="display:flex; gap: 8px; margin-top: 12px;">
      <button id="btnAtualizarBases" class="secondary" style="flex: 1;">Bases</button>
      <button id="btnUsarBase" style="flex: 1;">Usar base selecionada</button>
    </div>

    <button id="btnDesabilitarBase" class="secondary" style="width:100%; margin-top: 10px;">Desabilitar base selecionada</button>

    <div style="margin-top: 14px;">
      <div style="font-weight: 700; font-size: 12px; color:#333; text-align:left; margin-bottom: 8px;">
        Criar nova base
      </div>

      <input id="novaBaseNome" type="text" placeholder="Ex.: cliente_xpto" />
      <input id="novaBaseArquivo" class="file" type="file" accept=".xlsx,.xls,.csv" />
      <button id="btnCriarBaseImportar">Criar base e importar planilha</button>
    </div>

    <div id="statusApp" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
